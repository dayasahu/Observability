# Prometheus config.
# We accept remote_write from the OTel collector AND scrape services directly,
# whichever path is most convenient. Either alone is enough; both is fine too.

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: docker-compose
    env: dev

scrape_configs:
  # Self-scrape so the Prometheus dashboard is meaningful.
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # The collector exposes its internal telemetry on :8888.
  - job_name: 'otel-collector'
    static_configs:
      - targets: ['otel-collector:8888']

  # Direct pull from each Spring Boot Actuator. Redundant with the
  # collector's prometheus receiver but cheap insurance.
  - job_name: 'spring-services'
    metrics_path: /actuator/prometheus
    scrape_interval: 15s
    static_configs:
      - targets:
          - 'host.docker.internal:30081'
          - 'host.docker.internal:30082'
          - 'host.docker.internal:30083'
          - 'host.docker.internal:30071'
        labels:
          env: dev

  # Tempo's metrics_generator publishes service-graph and span-metrics here.
  - job_name: 'tempo'
    static_configs:
      - targets: ['tempo:3200']
