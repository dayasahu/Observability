# Full LGTM + OTel observability stack for local dev.
#
# Quick start:
#   docker network create observability  # one-time
#   docker compose -f observability/docker-compose.yml up -d
#
# Then open Grafana at http://localhost:3000 (anonymous Admin).
#
# Your Spring Boot services should:
#   - join the `observability` network
#   - set OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
#   - expose /actuator/prometheus

name: observability

services:

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.96.0
    container_name: otel-collector
    command: ["--config=/etc/otelcol/config.yaml"]
    volumes:
      - ./otel-collector/config.yaml:/etc/otelcol/config.yaml:ro
    ports:
      - "4317:4317"     # OTLP gRPC (services push here)
      - "4318:4318"     # OTLP HTTP
      - "8888:8888"     # collector self-metrics
      - "13133:13133"   # health check
    depends_on:
      - loki
      - tempo
      - prometheus
    networks:
      - observability

  loki:
    image: grafana/loki:3.0.0
    container_name: loki
    command: ["-config.file=/etc/loki/loki-config.yaml"]
    volumes:
      - ./loki/loki-config.yaml:/etc/loki/loki-config.yaml:ro
      - loki-data:/loki
    ports:
      - "3100:3100"
    networks:
      - observability

  tempo:
    image: grafana/tempo:2.4.1
    container_name: tempo
    command: ["-config.file=/etc/tempo/tempo-config.yaml"]
    volumes:
      - ./tempo/tempo-config.yaml:/etc/tempo/tempo-config.yaml:ro
      - tempo-data:/var/tempo
    ports:
      - "3200:3200"     # Tempo HTTP API (Grafana queries this)
    # NOTE: Tempo also listens on 4317/4318 internally, but those are reached
    # via the docker network at tempo:4317 - no host port mapping needed and
    # so no clash with the collector.
    networks:
      - observability

  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=24h"
      - "--web.enable-remote-write-receiver"
      - "--web.enable-lifecycle"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - observability

  grafana:
    image: grafana/grafana:10.4.2
    container_name: grafana
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_DISABLE_LOGIN_FORM=true
      - GF_FEATURE_TOGGLES_ENABLE=traceqlEditor
      - GF_INSTALL_PLUGINS=
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
      - loki
      - tempo
    networks:
      - observability

volumes:
  loki-data:
  tempo-data:
  prometheus-data:
  grafana-data:

networks:
  observability:
    name: observability
    external: true
