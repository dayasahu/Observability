# Single-binary Loki config for local dev.
# Stores everything on local filesystem under /loki. Not for production.

auth_enabled: false

server:
  http_listen_port: 3100
  grpc_listen_port: 9096
  log_level: info

common:
  instance_addr: 127.0.0.1
  path_prefix: /loki
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory: /loki/rules
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory

# Native OTLP support is enabled at /otlp/v1/logs from Loki 3.0+.
# The OTel collector pushes logs there directly.
limits_config:
  allow_structured_metadata: true
  volume_enabled: true
  retention_period: 168h          # 7 days

schema_config:
  configs:
    - from: 2024-01-01
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

compactor:
  working_directory: /loki/compactor
  compaction_interval: 10m
  retention_enabled: true
  retention_delete_delay: 2h
  retention_delete_worker_count: 150
  delete_request_store: filesystem

ruler:
  alertmanager_url: http://localhost:9093

analytics:
  reporting_enabled: false
